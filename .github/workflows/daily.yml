name: Daily Contribution

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update file
        run: |
          echo "Update $(date)" >> log.txt

      - name: Commit & Push
        run: |
          git config --global user.name "Rithesh"
          git config --global user.email "your_github_email"

          git add .
          git commit -m "Auto commit $(date)" || echo "No changes"

          git push