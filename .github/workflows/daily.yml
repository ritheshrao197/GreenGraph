name: Advanced GitHub Activity Engine

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  github-activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Full GitHub Activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |

          git config --global user.name "Rithesh"
          git config --global user.email "rithesh197rao@gmail.com"

          TODAY=$(date '+%Y-%m-%d')
          WEEKDAY=$(date '+%u')
          MONTH=$(date '+%m')

          LAST_RUN_FILE="last_run.txt"
          STREAK_FILE="streak_count.txt"

          # =====================================================
          # PREVENT MULTIPLE RUNS
          # =====================================================

          if [ -f "$LAST_RUN_FILE" ] && [ "$(cat $LAST_RUN_FILE)" = "$TODAY" ]; then
            echo "Already executed today."
            exit 0
          fi

          # =====================================================
          # STREAK MANAGEMENT
          # =====================================================

          if [ ! -f "$STREAK_FILE" ]; then
            echo "1" > "$STREAK_FILE"
          fi

          STREAK=$(cat "$STREAK_FILE")

          if [ -f "$LAST_RUN_FILE" ]; then

            LAST_DATE=$(cat "$LAST_RUN_FILE")

            LAST_TS=$(date -d "$LAST_DATE" +%s)
            TODAY_TS=$(date -d "$TODAY" +%s)

            DIFF_DAYS=$(( (TODAY_TS - LAST_TS) / 86400 ))

            if [ "$DIFF_DAYS" -gt 1 ]; then
              STREAK=1
            fi
          fi

          # =====================================================
          # ANIMATED CONTRIBUTION GRADIENT
          # =====================================================

          DAY=$(date '+%d')

          WAVE=$(( 15 + 12 * DAY / 30 ))

          PULSE=$(( (DAY % 10) * 3 ))

          if [ "$WEEKDAY" -ge 6 ]; then
            WEEKEND_DROP=10
          else
            WEEKEND_DROP=0
          fi

          NOISE=$(( RANDOM % 6 ))

          COMMITS=$(( WAVE + PULSE + NOISE - WEEKEND_DROP ))

          if [ "$COMMITS" -lt 1 ]; then
            COMMITS=1
          fi

          if [ "$COMMITS" -gt 50 ]; then
            COMMITS=50
          fi

          echo "Today's commits: $COMMITS"

          # =====================================================
          # OFFICE HOURS
          # =====================================================

          START_HOUR=9
          END_HOUR=18

          # =====================================================
          # CREATE COMMITS
          # =====================================================

          for i in $(seq 1 $COMMITS); do

            RANDOM_HOUR=$(( RANDOM % (END_HOUR - START_HOUR) + START_HOUR ))
            RANDOM_MIN=$(( RANDOM % 60 ))
            RANDOM_SEC=$(( RANDOM % 60 ))

            RANDOM_TIME=$(printf "%02d:%02d:%02d" \
            $RANDOM_HOUR $RANDOM_MIN $RANDOM_SEC)

            COMMIT_DATE="$TODAY $RANDOM_TIME"

            export GIT_AUTHOR_DATE="$COMMIT_DATE"
            export GIT_COMMITTER_DATE="$COMMIT_DATE"

            echo "Activity $i | $COMMIT_DATE" >> activity_log.txt

            git add activity_log.txt

            git commit -m "feat: contribution update $i/$COMMITS" || true

            echo "Commit $i created"

            sleep 1

          done

          git push origin ${{ github.ref }}

          # =====================================================
          # CREATE RANDOM ISSUES
          # =====================================================

          ISSUE_CHANCE=$(( RANDOM % 100 ))

          if [ "$ISSUE_CHANCE" -lt 35 ]; then

            ISSUE_TITLE_LIST=(
              "Optimize loading performance"
              "Refactor UI manager"
              "Fix edge-case handling"
              "Improve error logging"
              "Update API validation"
              "Improve caching system"
              "Cleanup old assets"
              "Reduce memory allocation"
            )

            RANDOM_INDEX=$(( RANDOM % ${#ISSUE_TITLE_LIST[@]} ))

            ISSUE_TITLE="${ISSUE_TITLE_LIST[$RANDOM_INDEX]}"

            gh issue create \
              --repo "$REPO" \
              --title "$ISSUE_TITLE" \
              --body "Automated tracking issue generated for ongoing improvements."

            echo "Issue created"
          fi

          # =====================================================
          # CREATE RANDOM PULL REQUESTS
          # =====================================================

          PR_CHANCE=$(( RANDOM % 100 ))

          if [ "$PR_CHANCE" -lt 25 ]; then

            BRANCH_NAME="auto/pr-$TODAY-$RANDOM"

            git checkout -b "$BRANCH_NAME"

            echo "PR update $(date)" >> pr_activity.txt

            git add pr_activity.txt

            git commit -m "feat: automated improvement update"

            git push origin "$BRANCH_NAME"

            gh pr create \
              --repo "$REPO" \
              --title "Automated improvement update" \
              --body "Generated automated pull request for activity simulation." \
              --base main \
              --head "$BRANCH_NAME"

            echo "Pull request created"

            git checkout main
          fi

          # =====================================================
          # ADD CODE REVIEW COMMENTS
          # =====================================================

          REVIEW_CHANCE=$(( RANDOM % 100 ))

          if [ "$REVIEW_CHANCE" -lt 30 ]; then

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --limit 1 \
              --json number \
              --jq '.[0].number')

            if [ ! -z "$PR_NUMBER" ]; then

              REVIEW_COMMENTS=(
                "Looks good overall."
                "Consider optimizing this logic."
                "Please improve naming consistency."
                "Can we reduce memory usage here?"
                "Edge cases should be handled."
                "Nice implementation."
                "This section may need refactoring."
              )

              RANDOM_REVIEW=$(( RANDOM % ${#REVIEW_COMMENTS[@]} ))

              REVIEW_BODY="${REVIEW_COMMENTS[$RANDOM_REVIEW]}"

              gh pr comment "$PR_NUMBER" \
                --repo "$REPO" \
                --body "$REVIEW_BODY"

              echo "Review comment added"
            fi
          fi

          # =====================================================
          # UPDATE STREAK
          # =====================================================

          NEXT_STREAK=$(( STREAK + 1 ))

          if [ "$NEXT_STREAK" -gt 365 ]; then
            NEXT_STREAK=365
          fi

          echo "$NEXT_STREAK" > "$STREAK_FILE"
          echo "$TODAY" > "$LAST_RUN_FILE"

          git add "$STREAK_FILE" "$LAST_RUN_FILE"

          git commit -m "chore: maintain streak $NEXT_STREAK days" || true

          git push origin ${{ github.ref }}

          echo "GitHub activity generation completed."
