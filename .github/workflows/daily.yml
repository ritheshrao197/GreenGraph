name: github-activity

env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
schedule:
- cron: "0 * * * *"
workflow_dispatch:

permissions:
contents: write
pull-requests: write
issues: write

jobs:
github-activity:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Generate Advanced GitHub Activity
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    run: |

      set -e

      git config --global user.name "Rithesh"
      git config --global user.email "rithesh197rao@gmail.com"

      TODAY=$(date '+%Y-%m-%d')
      WEEKDAY=$(date '+%u')
      MONTH=$(date '+%m')

      LAST_RUN_FILE="last_run.txt"
      STREAK_FILE="streak_count.txt"

      # =====================================================
      # PREVENT MULTIPLE DAILY RUNS
      # =====================================================

      if [ -f "$LAST_RUN_FILE" ] && [ "$(cat $LAST_RUN_FILE)" = "$TODAY" ]; then
        echo "Already executed today."
        exit 0
      fi

      # =====================================================
      # STREAK MANAGEMENT
      # =====================================================

      if [ ! -f "$STREAK_FILE" ]; then
        echo "1" > "$STREAK_FILE"
      fi

      STREAK=$(cat "$STREAK_FILE")

      if [ -f "$LAST_RUN_FILE" ]; then

        LAST_DATE=$(cat "$LAST_RUN_FILE")

        LAST_TS=$(date -d "$LAST_DATE" +%s)
        TODAY_TS=$(date -d "$TODAY" +%s)

        DIFF_DAYS=$(( (TODAY_TS - LAST_TS) / 86400 ))

        if [ "$DIFF_DAYS" -gt 1 ]; then
          echo "Missed streak detected. Resetting."
          STREAK=1
        fi
      fi

      # =====================================================
      # MONTHLY ACTIVITY ROTATION
      # =====================================================

      MONTHLY_MULTIPLIER=1

      case "$MONTH" in
        1|2|3)
          MONTHLY_MULTIPLIER=2
          ;;
        4|5)
          MONTHLY_MULTIPLIER=1
          ;;
        6|7|8)
          MONTHLY_MULTIPLIER=1
          ;;
        9|10|11)
          MONTHLY_MULTIPLIER=3
          ;;
        12)
          MONTHLY_MULTIPLIER=2
          ;;
      esac

      # =====================================================
      # CONTRIBUTION GRADIENT ENGINE
      # =====================================================

      DAY=$(date '+%d')

      WAVE=$(( 10 + (DAY % 10) * MONTHLY_MULTIPLIER ))

      PULSE=$(( (DAY % 7) * 2 ))

      if [ "$WEEKDAY" -ge 6 ]; then
        WEEKEND_DROP=10
      else
        WEEKEND_DROP=0
      fi

      NOISE=$(( RANDOM % 5 ))

      COMMITS=$(( WAVE + PULSE + NOISE - WEEKEND_DROP ))

      if [ "$COMMITS" -lt 1 ]; then
        COMMITS=1
      fi

      if [ "$COMMITS" -gt 60 ]; then
        COMMITS=60
      fi

      echo "Today's commits: $COMMITS"

      # =====================================================
      # OFFICE HOURS COMMITS
      # =====================================================

      START_HOUR=9
      END_HOUR=18

      for i in $(seq 1 $COMMITS); do

        RANDOM_HOUR=$(( RANDOM % (END_HOUR - START_HOUR) + START_HOUR ))
        RANDOM_MIN=$(( RANDOM % 60 ))
        RANDOM_SEC=$(( RANDOM % 60 ))

        RANDOM_TIME=$(printf "%02d:%02d:%02d" \
        $RANDOM_HOUR $RANDOM_MIN $RANDOM_SEC)

        COMMIT_DATE="$TODAY $RANDOM_TIME"

        export GIT_AUTHOR_DATE="$COMMIT_DATE"
        export GIT_COMMITTER_DATE="$COMMIT_DATE"

        echo "Activity $i | $COMMIT_DATE" >> activity_log.txt

        git add activity_log.txt

        git commit -m "feat: contribution update $i/$COMMITS" || true

        sleep 1

      done

      # =====================================================
      # RETRY LOGIC FOR GIT PUSH
      # =====================================================

      PUSH_SUCCESS=0

      for attempt in 1 2 3; do

        if git push origin ${{ github.ref }}; then
          PUSH_SUCCESS=1
          break
        fi

        echo "Push failed. Retry attempt $attempt"

        sleep 5

      done

      if [ "$PUSH_SUCCESS" -ne 1 ]; then
        echo "Push failed after retries."
        exit 1
      fi

      # =====================================================
      # RATE LIMITED ISSUE CREATION
      # =====================================================

      OPEN_ISSUES=$(gh issue list \
        --repo "$REPO" \
        --state open \
        --limit 100 \
        --json number \
        --jq '. | length')

      if [ "$OPEN_ISSUES" -lt 5 ]; then

        ISSUE_CHANCE=$(( RANDOM % 100 ))

        if [ "$ISSUE_CHANCE" -lt 25 ]; then

          ISSUE_TITLE_LIST=(
            "Optimize rendering pipeline"
            "Improve error handling"
            "Refactor state management"
            "Reduce memory allocation"
            "Improve loading flow"
            "Update dependency handling"
          )

          RANDOM_INDEX=$(( RANDOM % ${#ISSUE_TITLE_LIST[@]} ))

          ISSUE_TITLE="${ISSUE_TITLE_LIST[$RANDOM_INDEX]}"

          DUPLICATE=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "$ISSUE_TITLE" \
            --json number \
            --jq '. | length')

          if [ "$DUPLICATE" -eq 0 ]; then

            gh issue create \
              --repo "$REPO" \
              --title "$ISSUE_TITLE" \
              --body "Automated tracking issue."

            echo "Issue created"
          fi
        fi
      fi

      # =====================================================
      # AUTO CLOSE STALE ISSUES
      # =====================================================

      STALE_ISSUES=$(gh issue list \
        --repo "$REPO" \
        --state open \
        --limit 20 \
        --json number,updatedAt)

      echo "$STALE_ISSUES" | jq -c '.[]' | while read issue; do

        NUMBER=$(echo "$issue" | jq -r '.number')
        UPDATED=$(echo "$issue" | jq -r '.updatedAt')

        UPDATED_TS=$(date -d "$UPDATED" +%s)
        NOW_TS=$(date +%s)

        AGE_DAYS=$(( (NOW_TS - UPDATED_TS) / 86400 ))

        if [ "$AGE_DAYS" -gt 14 ]; then

          gh issue close "$NUMBER" \
            --repo "$REPO" \
            --comment "Closing stale issue automatically."

          echo "Closed stale issue #$NUMBER"
        fi

      done

      # =====================================================
      # PREVENT DUPLICATE PRs
      # =====================================================

      OPEN_PRS=$(gh pr list \
        --repo "$REPO" \
        --state open \
        --limit 100 \
        --json number \
        --jq '. | length')

      if [ "$OPEN_PRS" -lt 3 ]; then

        PR_CHANCE=$(( RANDOM % 100 ))

        if [ "$PR_CHANCE" -lt 20 ]; then

          BRANCH_NAME="auto/pr-$TODAY-$RANDOM"

          git checkout -b "$BRANCH_NAME"

          echo "PR update $(date)" >> pr_activity.txt

          git add pr_activity.txt

          git commit -m "feat: automated improvement"

          git push origin "$BRANCH_NAME"

          EXISTING_PR=$(gh pr list \
            --repo "$REPO" \
            --head "$BRANCH_NAME" \
            --json number \
            --jq '. | length')

          if [ "$EXISTING_PR" -eq 0 ]; then

            gh pr create \
              --repo "$REPO" \
              --title "Automated improvement update" \
              --body "Generated automated pull request." \
              --base main \
              --head "$BRANCH_NAME"

            echo "PR created"

          fi

          git checkout main

        fi
      fi

      # =====================================================
      # AUTO MERGE GENERATED PRs
      # =====================================================

      PR_NUMBERS=$(gh pr list \
        --repo "$REPO" \
        --state open \
        --json number \
        --jq '.[].number')

      for PR in $PR_NUMBERS; do

        gh pr merge "$PR" \
          --repo "$REPO" \
          --squash \
          --delete-branch || true

        echo "Merged PR #$PR"

      done

      # =====================================================
      # RANDOM CODE REVIEW COMMENTS
      # =====================================================

      REVIEW_CHANCE=$(( RANDOM % 100 ))

      if [ "$REVIEW_CHANCE" -lt 30 ]; then

        PR_NUMBER=$(gh pr list \
          --repo "$REPO" \
          --limit 1 \
          --json number \
          --jq '.[0].number')

        if [ ! -z "$PR_NUMBER" ]; then

          COMMENTS=(
            "Looks good overall."
            "Can we optimize this section?"
            "Please improve naming consistency."
            "Nice cleanup."
            "Potential edge case here."
            "Memory usage can be reduced."
          )

          RANDOM_COMMENT=$(( RANDOM % ${#COMMENTS[@]} ))

          REVIEW_BODY="${COMMENTS[$RANDOM_COMMENT]}"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$REVIEW_BODY"

          echo "Review comment added"

        fi
      fi

      # =====================================================
      # UPDATE STREAK
      # =====================================================

      NEXT_STREAK=$(( STREAK + 1 ))

      if [ "$NEXT_STREAK" -gt 365 ]; then
        NEXT_STREAK=365
      fi

      echo "$NEXT_STREAK" > "$STREAK_FILE"
      echo "$TODAY" > "$LAST_RUN_FILE"

      git add "$STREAK_FILE" "$LAST_RUN_FILE"

      git commit -m "chore: maintain streak $NEXT_STREAK days" || true

      git push origin ${{ github.ref }}

      echo "Advanced GitHub activity completed."
